  <!-- kcal -->
  <text x="265" y="108"
        fill="#FF5A00"
        font-size="24"
        font-family="Poppins, Arial, sans-serif"
        font-weight="700">
    kcal
  </text>

  <!-- Bottom Accent -->
  <rect x="0" y="145" width="380" height="15" rx="8" fill="#FF5A00"/>

